name: Update Prices

# Scheduled runs are paused until GitHub Actions secrets and ingestion cadence are configured.
on:
  workflow_dispatch:
    inputs:
      confirm_write:
        description: "Run real update writes. Leave false for dry-run safety."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ofertas-super-data-jobs
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Update prices
        id: update_prices
        run: |
          if [ "${{ inputs.confirm_write }}" = "true" ]; then
            npm run update:prices -- --confirm-write
          else
            npm run update:prices -- --dry-run
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          VTEX_SHA256_HASH: ${{ secrets.VTEX_SHA256_HASH }}

      - name: Report scraper status
        if: ${{ always() && inputs.confirm_write == true }}
        run: npx tsx scripts/report-scraper-status.ts
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SCRAPER_ALERT_WEBHOOK_URL: ${{ secrets.SCRAPER_ALERT_WEBHOOK_URL }}
          SCRAPER_JOB_NAME: update-prices
          SCRAPER_JOB_STATUS: ${{ steps.update_prices.outcome }}

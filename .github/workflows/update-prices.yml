name: Update Prices

# Scheduled runs are paused until GitHub Actions secrets and ingestion cadence are configured.
on:
  workflow_dispatch:
    inputs:
      confirm_write:
        description: "Deprecated legacy path: true only exercises the guarded command; real writes stay disabled."
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ofertas-super-data-jobs
  cancel-in-progress: false

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Update prices
        id: update_prices
        run: |
          if [ "${{ inputs.confirm_write }}" = "true" ]; then
            echo "Legacy update-prices real writes are disabled; use ingestion v2 refresh-existing gates instead."
          fi
          npm run update:prices -- --dry-run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          VTEX_SHA256_HASH: ${{ secrets.VTEX_SHA256_HASH }}
          # Legacy update-prices is not the approved production freshness path.
          # Keep real writes disabled unless this separate emergency guard is explicitly set.
          LEGACY_PRICE_WRITE_APPROVED: "false"

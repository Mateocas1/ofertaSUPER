name: Ingest Shadow

# Scheduled runs are paused until GitHub Actions secrets and ingestion cadence are configured.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ingest-shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run shadow ingestion
        id: ingest_shadow
        run: npm run ingest
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          VTEX_SHA256_HASH: ${{ secrets.VTEX_SHA256_HASH }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SCRAPER_ALERT_WEBHOOK_URL: ${{ secrets.SCRAPER_ALERT_WEBHOOK_URL }}
          INGESTION_V2: shadow

      - name: Print ingestion metrics snapshot
        if: always()
        run: npm run metrics:ingestion -- --dry-run
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Cleanup expired staging records
        if: always()
        run: npm run cleanup:staging
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Report scraper status
        if: always()
        run: npx tsx scripts/report-scraper-status.ts
        env:
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          SCRAPER_ALERT_WEBHOOK_URL: ${{ secrets.SCRAPER_ALERT_WEBHOOK_URL }}
          SCRAPER_JOB_NAME: ingest-shadow
          SCRAPER_JOB_STATUS: ${{ steps.ingest_shadow.outcome }}
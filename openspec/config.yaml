schema: spec-driven

context: |
  Project: ofertasuper
  Stack: Next.js 15, React 19, TypeScript, Prisma, Tailwind CSS 4, Clerk, Upstash Redis/Ratelimit, PWA support
  Architecture: App Router-based Next.js application with Prisma-backed data access and CLI/script-heavy operational workflows
  Testing: tsx --test for Node test files under tests/, ESLint, TypeScript typecheck
  Style: Strict TypeScript, Next.js ESLint presets, path alias @/* -> src/*

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    - tdd: true
    - test_command: "npm test"
  verify:
    - test_command: "npm test"
    - build_command: "npm run build"
    - coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
